name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Markdown style check using the repository's .markdownlint.json config.
  # Advisory: reports style issues without failing the build.
  markdownlint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !.github/**

  # awesome-lint checks the README against awesome.re list conventions.
  # Advisory only: this is a multi-file list, so some rules will not apply.
  awesome-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run awesome-lint (advisory)
        run: npx awesome-lint || true
